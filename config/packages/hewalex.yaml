# Home Assistant MQTT package for Hewalex heat pump
# Place this file in your /config/packages/ directory and ensure packages are
# enabled in configuration.yaml:
#   homeassistant:
#     packages: !include_dir_named packages
#
# Adjust the MQTT topic prefix (default: "Heatpump") to match Device_Pcwu_MqttTopic
# in your hewalex2mqttconfig.ini.

mqtt:
  switch:
    - name: "Heat Pump On"
      command_topic: "Heatpump/Command/HeatPumpEnabled"
      payload_on: "True"
      payload_off: "False"
      state_on: "True"
      state_off: "False"
      unique_id: heatpump_enabled_switch
      retain: true
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

  sensor:
    - name: "Heat Pump T1 Ambient"
      state_topic: "Heatpump/T1"
      unit_of_measurement: "°C"
      unique_id: "heatpump_t1"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Enabled"
      state_topic: "Heatpump/HeatPumpEnabled"
      unique_id: "heatpump_enabled"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T2 Floor Out"
      state_topic: "Heatpump/T2"
      unit_of_measurement: "°C"
      unique_id: "heatpump_t2"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T3 Floor In"
      state_topic: "Heatpump/T3"
      unit_of_measurement: "°C"
      unique_id: "heatpump_t3"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T6 Water Pump In"
      state_topic: "Heatpump/T6"
      unit_of_measurement: "°C"
      unique_id: "heatpump_t6"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T7 Out"
      state_topic: "Heatpump/T7"
      unit_of_measurement: "°C"
      unique_id: "heatpump_t7"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T8 Evaporator"
      state_topic: "Heatpump/T8"
      unit_of_measurement: "°C"
      unique_id: "heatpump_t8"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T9 Before Compressor"
      state_topic: "Heatpump/T9"
      unit_of_measurement: "°C"
      unique_id: "heatpump_t9"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T10 After Compressor"
      state_topic: "Heatpump/T10"
      unit_of_measurement: "°C"
      unique_id: "heatpump_t10"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Target Temperature"
      state_topic: "Heatpump/TapWaterTemp"
      unit_of_measurement: "°C"
      unique_id: "heatpump_tapwater_temp"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Hysteresis"
      state_topic: "Heatpump/TapWaterHysteresis"
      unit_of_measurement: "°C"
      unique_id: "heatpump_hysteresis"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Expansion Valve"
      state_topic: "Heatpump/EV1"
      unit_of_measurement: "unit"
      unique_id: "heatpump_ev1"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Defrost Interval"
      state_topic: "Heatpump/DefrostingInterval"
      unit_of_measurement: "min"
      unique_id: "heatpump_defrost_interval"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Defrost Start Temp"
      state_topic: "Heatpump/DefrostingStartTemp"
      unit_of_measurement: "°C"
      unique_id: "heatpump_defrost_start"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Defrost Stop Temp"
      state_topic: "Heatpump/DefrostingStopTemp"
      unit_of_measurement: "°C"
      unique_id: "heatpump_defrost_stop"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Max Defrost Duration"
      state_topic: "Heatpump/DefrostingMaxTime"
      unit_of_measurement: "min"
      unique_id: "heatpump_defrost_max_time"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Waiting Status"
      state_topic: "Heatpump/WaitingStatus"
      unique_id: "heatpump_waiting_status"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

  binary_sensor:
    - name: "Heat Pump Running"
      state_topic: "Heatpump/HeatPumpEnabled"
      unique_id: "heatpump_running"
      payload_on: "True"
      payload_off: "False"
      device_class: "running"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Circulation Pump"
      state_topic: "Heatpump/CirculationPumpON"
      unique_id: "heatpump_circulation_pump"
      payload_on: "True"
      payload_off: "False"
      device_class: "running"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Fan"
      state_topic: "Heatpump/FanON"
      unique_id: "heatpump_fan"
      payload_on: "True"
      payload_off: "False"
      device_class: "running"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Electric Heater"
      state_topic: "Heatpump/HeaterEON"
      unique_id: "heatpump_heater"
      payload_on: "True"
      payload_off: "False"
      device_class: "running"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Compressor"
      state_topic: "Heatpump/CompressorON"
      unique_id: "heatpump_compressor"
      payload_on: "True"
      payload_off: "False"
      device_class: "running"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

  climate:
    - name: "Heat Pump Floor Heating"
      unique_id: "hewalex_floor_heating"
      retain: true
      modes:
        - "heat"
        - "off"
      current_temperature_topic: "Heatpump/T2"
      temperature_command_topic: "Heatpump/Command/TapWaterTemp"
      initial: 30
      min_temp: 15
      max_temp: 40
      temp_step: 1
      temperature_command_template: "{{ value | int }}"
      power_command_topic: "Heatpump/Command/HeatPumpEnabled"
      mode_state_topic: "Heatpump/HeatPumpEnabled"
      mode_command_topic: "Heatpump/Command/HeatPumpEnabled"
      mode_state_template: "{% if value == 'True' %}heat{% else %}off{% endif %}"
      mode_command_template: "{% if value == 'heat' %}True{% else %}False{% endif %}"

    - name: "Heat Pump Hysteresis Control"
      unique_id: "hewalex_hysteresis_control"
      retain: true
      modes:
        - "heat"
      current_temperature_topic: "Heatpump/TapWaterHysteresis"
      temperature_command_topic: "Heatpump/Command/TapWaterHysteresis"
      initial: 6
      min_temp: 2
      max_temp: 10
      temp_step: 1
      temperature_command_template: "{{ value | int }}"
