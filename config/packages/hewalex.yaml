mqtt:
  switch:
    # Main on/off switch for the heat pump.
    # optimistic: true prevents the switch from reverting immediately due to retained MQTT state.
    # Commands are routed via HA automation → input_boolean → AppDaemon listen_state → RS485.
    - name: "Heat Pump On"
      command_topic: "Heatpump/Command/HeatPumpEnabled"
      state_topic: "Heatpump/HeatPumpEnabled"
      payload_on: "True"
      payload_off: "False"
      optimistic: true
      unique_id: warmtepomp_aan_switch
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

  sensor:

    - name: "Heat Pump T1 Ambient"
      state_topic: "Heatpump/T1"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_t1"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T2 Floor Out"
      state_topic: "Heatpump/T2"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_t2"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T3 Floor In"
      state_topic: "Heatpump/T3"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_t3"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T6 Pump In"
      state_topic: "Heatpump/T6"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_t6"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T7 Out"
      state_topic: "Heatpump/T7"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_t7"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T8 Evaporator"
      state_topic: "Heatpump/T8"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_t8"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T9 Before Compressor"
      state_topic: "Heatpump/T9"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_t9"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump T10 After Compressor"
      state_topic: "Heatpump/T10"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_t10"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Target Temperature"
      state_topic: "Heatpump/TapWaterTemp"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_tapwater"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Hysteresis"
      state_topic: "Heatpump/TapWaterHysteresis"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_hysteresis"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Expansion Valve"
      state_topic: "Heatpump/EV1"
      unit_of_measurement: "steps"
      unique_id: "warmtepomp_ev1"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Defrost Interval"
      state_topic: "Heatpump/DefrostingInterval"
      unit_of_measurement: "min"
      unique_id: "warmtepomp_defrosting_interval"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Defrost Start Temp"
      state_topic: "Heatpump/DefrostingStartTemp"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_defrosting_start"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Defrost Stop Temp"
      state_topic: "Heatpump/DefrostingStopTemp"
      unit_of_measurement: "°C"
      unique_id: "warmtepomp_defrosting_stop"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Max Defrost Duration"
      state_topic: "Heatpump/DefrostingMaxTime"
      unit_of_measurement: "min"
      unique_id: "warmtepomp_defrosting_max_time"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Waiting Status"
      state_topic: "Heatpump/WaitingStatus"
      unique_id: "warmtepomp_waiting_status"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

  binary_sensor:

    - name: "Heat Pump Status"
      state_topic: "Heatpump/HeatPumpEnabled"
      unique_id: "warmtepomp_heatpump"
      payload_on: "True"
      payload_off: "False"
      device_class: "running"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Circulation Pump"
      state_topic: "Heatpump/CirculationPumpON"
      unique_id: "warmtepomp_waterpomp"
      payload_on: "True"
      payload_off: "False"
      device_class: "running"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Fan"
      state_topic: "Heatpump/FanON"
      payload_on: "True"
      payload_off: "False"
      unique_id: "warmtepomp_fan"
      device_class: "running"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Heater"
      state_topic: "Heatpump/HeaterEON"
      payload_on: "True"
      payload_off: "False"
      unique_id: "warmtepomp_heater"
      device_class: "running"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

    - name: "Heat Pump Compressor"
      state_topic: "Heatpump/CompressorON"
      payload_on: "True"
      payload_off: "False"
      unique_id: "warmtepomp_compressor"
      device_class: "running"
      device:
        identifiers:
          - "heatpump_hewalex"
        name: "Hewalex Heat Pump"

  climate:
    - name: "Heat Pump Floor Temperature"
      unique_id: "hewalex_vloertemp"
      retain: true
      modes:
        - "heat"
        - "off"
      current_temperature_topic: "Heatpump/T2"
      temperature_state_topic: "Heatpump/TapWaterTemp"
      temperature_command_topic: "Heatpump/Command/TapWaterTemp"
      initial: 30
      min_temp: 15
      max_temp: 40
      temp_step: 1
      temperature_command_template: "{{ value | int }}"
      power_command_topic: "Heatpump/Command/HeatPumpEnabled"
      mode_state_topic: "Heatpump/HeatPumpEnabled"
      mode_command_topic: "Heatpump/Command/HeatPumpEnabled"
      mode_state_template: "{% if value == 'True' %}heat{% else %}off{% endif %}"
      mode_command_template: "{% if value == 'heat' %}True{% else %}False{% endif %}"

    - name: "Heat Pump Hysteresis Control"
      unique_id: "hewalex_hysteresis"
      retain: true
      modes:
        - "heat"
        - "off"
      current_temperature_topic: "Heatpump/TapWaterHysteresis"
      temperature_state_topic: "Heatpump/TapWaterHysteresis"
      temperature_command_topic: "Heatpump/Command/TapWaterHysteresis"
      initial: 6
      min_temp: 2
      max_temp: 10
      temp_step: 1
      temperature_command_template: "{{ value | int }}"

